<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום הולדת שמח לבארי! 🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let user = null;

        // התחברות אנונימית ואתחול
        async function initAuth() {
            await signInAnonymously(auth);
        }
        initAuth();
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) setupGreetingsListener();
        });

        function setupGreetingsListener() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'greetings'));
            onSnapshot(q, (snapshot) => {
                const list = [];
                snapshot.forEach(doc => list.push(doc.data()));
                renderGreetings(list);
            }, (err) => {});
        }

        function renderGreetings(list) {
            const container = document.getElementById('greetings-grid');
            container.innerHTML = list.map(g => `
                <button onclick="showGreeting('${g.sender}', '${g.text}')" class="bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-pink-500 transition text-center">
                    <span class="text-3xl">${g.emoji}</span>
                    <p class="font-bold text-sm mt-2">${g.sender}</p>
                </button>
            `).join('');
        }

        window.addNewGreeting = async function() {
            const sender = document.getElementById('new-sender').value;
            const text = document.getElementById('new-text').value;
            const emoji = window.selectedEmoji || '🎈';
            if (!sender || !text) {
                document.getElementById('form-error-msg').classList.remove('hidden');
                return;
            }
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'greetings'), { sender, text, emoji });
            document.getElementById('new-sender').value = '';
            document.getElementById('new-text').value = '';
            document.getElementById('greeting-form-container').classList.add('hidden');
        }
    </script>
    <style>
        body { font-family: 'Heebo', sans-serif; background: linear-gradient(135deg, #090d16 0%, #0f172a 50%, #1e1b4b 100%); overflow-x: hidden; }
        .glow-text { text-shadow: 0 0 15px rgba(236, 72, 153, 0.7), 0 0 30px rgba(236, 72, 153, 0.5); }
        .flame { animation: flicker 0.6s infinite alternate; }
        @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); } 100% { transform: scale(1.1) rotate(2deg); } }
        .wobble-gift { animation: wobble 1.5s infinite ease-in-out; }
        @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
    <!-- שאר הקוד המקורי נשאר ללא שינוי -->
    <header class="relative z-10 w-full px-6 py-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-md border-b border-pink-500/20">
        <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-indigo-400">בארי חוגג יום הולדת!</h1>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="text-center py-6">
            <h2 class="text-5xl font-black glow-text bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">מזל טוב בארי!</h2>
        </section>

        <section class="bg-slate-900/80 border border-pink-500/30 rounded-3xl p-8 shadow-2xl">
            <h3 class="text-3xl font-black text-center mb-6">💌 ברכות מהמשפחה</h3>
            <div id="greetings-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
            
            <div id="greeting-display" class="hidden mt-6 bg-slate-950 p-6 rounded-2xl text-center">
                <h5 id="greeting-sender" class="text-xl font-black text-yellow-400"></h5>
                <p id="greeting-text" class="text-slate-200 mt-2"></p>
            </div>

            <div class="mt-8 text-center">
                <button onclick="document.getElementById('greeting-form-container').classList.toggle('hidden')" class="bg-pink-600 px-6 py-3 rounded-full font-bold">כתבו ברכה לבארי!</button>
            </div>

            <div id="greeting-form-container" class="hidden mt-6 bg-slate-950 p-6 rounded-2xl max-w-lg mx-auto text-right">
                <input id="new-sender" placeholder="שם המברך" class="w-full bg-slate-900 p-3 rounded-xl mb-3 border border-slate-700">
                <textarea id="new-text" placeholder="הברכה שלכם..." class="w-full bg-slate-900 p-3 rounded-xl mb-3 border border-slate-700"></textarea>
                <button onclick="addNewGreeting()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 py-3 rounded-xl font-black">שילוח ברכה 🚀</button>
            </div>
        </section>
    </main>

    <script>
        window.showGreeting = (s, t) => {
            document.getElementById('greeting-display').classList.remove('hidden');
            document.getElementById('greeting-sender').innerText = s;
            document.getElementById('greeting-text').innerText = t;
        }
    </script>
</body>
</html>
